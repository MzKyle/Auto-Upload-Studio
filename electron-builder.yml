appId: com.uploader.app
productName: 云桥上传器
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: resources/
    to: resources/
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Utility
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
